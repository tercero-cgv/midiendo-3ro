<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Midiendo Nuestro Mundo — 3er Grado</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Fredoka+One&display=swap" rel="stylesheet"/>
<style>
:root{--indigo-900:#1e1b4b;--indigo-800:#312e81;--indigo-700:#3730a3;--indigo-600:#4338ca;--indigo-500:#6366f1;--indigo-400:#818cf8;--indigo-200:#c7d2fe;--amber-400:#fbbf24;--amber-300:#fcd34d;--teal-400:#2dd4bf;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Nunito',sans-serif;background:linear-gradient(135deg,var(--indigo-900) 0%,var(--indigo-700) 60%,#1e3a5f 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden;}
.bg-shapes{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;}
.shape{position:absolute;border-radius:50%;opacity:0.08;animation:float 8s ease-in-out infinite;}
.shape:nth-child(1){width:300px;height:300px;background:var(--indigo-400);top:-80px;right:-80px;}
.shape:nth-child(2){width:200px;height:200px;background:var(--teal-400);bottom:-60px;left:-60px;animation-delay:2s;}
.shape:nth-child(3){width:150px;height:150px;background:var(--amber-400);top:40%;left:5%;animation-delay:4s;}
.shape:nth-child(4){width:100px;height:100px;background:var(--indigo-200);bottom:20%;right:8%;animation-delay:1s;}
@keyframes float{0%,100%{transform:translateY(0);}50%{transform:translateY(-20px);}}
.stars{position:fixed;inset:0;pointer-events:none;z-index:0;}
.star{position:absolute;background:white;border-radius:50%;animation:twinkle 3s ease-in-out infinite;}
@keyframes twinkle{0%,100%{opacity:0.2;}50%{opacity:0.8;transform:scale(1.3);}}
.card{position:relative;z-index:10;background:rgba(255,255,255,0.07);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,0.15);border-radius:28px;padding:48px 44px;width:100%;max-width:440px;box-shadow:0 32px 80px rgba(0,0,0,0.4);animation:slideUp 0.6s cubic-bezier(0.34,1.56,0.64,1) both;}
@keyframes slideUp{from{opacity:0;transform:translateY(40px) scale(0.95);}to{opacity:1;transform:translateY(0) scale(1);}}
.logo-wrap{text-align:center;margin-bottom:32px;}
.logo-icon{font-size:56px;display:block;margin-bottom:8px;animation:bounce 2s ease-in-out infinite;}
@keyframes bounce{0%,100%{transform:translateY(0);}50%{transform:translateY(-8px);}}
h1{font-family:'Fredoka One',cursive;font-size:26px;color:white;line-height:1.2;margin-bottom:4px;}
.subtitle{color:var(--indigo-200);font-size:14px;font-weight:600;}
.form-group{margin-bottom:20px;}
label{display:block;color:var(--indigo-200);font-size:13px;font-weight:700;margin-bottom:8px;text-transform:uppercase;letter-spacing:0.05em;}
select,input{width:100%;padding:14px 18px;border-radius:14px;border:2px solid rgba(255,255,255,0.15);background:rgba(255,255,255,0.1);color:white;font-family:'Nunito',sans-serif;font-size:16px;font-weight:600;outline:none;transition:border-color 0.2s;appearance:none;-webkit-appearance:none;}
select option{background:var(--indigo-800);color:white;}
select:focus,input:focus{border-color:var(--indigo-400);background:rgba(255,255,255,0.15);}
input[type="password"]{letter-spacing:4px;}
input::placeholder{letter-spacing:0;opacity:0.5;}
.select-wrapper{position:relative;}
.select-wrapper::after{content:'▼';position:absolute;right:18px;top:50%;transform:translateY(-50%);color:#a5b4fc;pointer-events:none;font-size:12px;}
.error-msg{color:#fca5a5;font-size:13px;font-weight:700;text-align:center;margin-top:-8px;margin-bottom:12px;display:none;}
.error-msg.show{display:block;animation:shake 0.4s ease;}
@keyframes shake{0%,100%{transform:translateX(0);}25%{transform:translateX(-8px);}75%{transform:translateX(8px);}}
.btn-enter{width:100%;padding:16px;border-radius:16px;border:none;background:linear-gradient(135deg,var(--amber-300),var(--amber-400));color:var(--indigo-900);font-family:'Fredoka One',cursive;font-size:20px;cursor:pointer;transition:transform 0.15s,box-shadow 0.15s;box-shadow:0 4px 20px rgba(251,191,36,0.4);display:flex;align-items:center;justify-content:center;gap:10px;}
.btn-enter:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(251,191,36,0.5);}
.maestro-link{text-align:center;margin-top:24px;}
.maestro-link a{color:#a5b4fc;font-size:13px;font-weight:700;text-decoration:none;opacity:0.7;transition:opacity 0.2s;}
.maestro-link a:hover{opacity:1;}
.spinner{display:none;width:20px;height:20px;border:3px solid rgba(30,27,75,0.3);border-top-color:var(--indigo-900);border-radius:50%;animation:spin 0.6s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>
<div class="bg-shapes"><div class="shape"></div><div class="shape"></div><div class="shape"></div><div class="shape"></div></div>
<div class="stars" id="stars"></div>
<div class="card">
  <div class="logo-wrap">
    <span class="logo-icon">📏</span>
    <h1>Midiendo Nuestro Mundo</h1>
    <p class="subtitle">3er Grado · Matemáticas</p>
  </div>
  <div class="form-group">
    <label>👤 ¿Quién eres?</label>
    <div class="select-wrapper">
      <select id="studentSelect"><option value="">Cargando...</option></select>
    </div>
  </div>
  <div class="form-group">
    <label>🔑 Tu código secreto</label>
    <input type="password" id="codeInput" placeholder="Escribe tu código" maxlength="20" autocomplete="off"/>
  </div>
  <div class="error-msg" id="errorMsg"></div>
  <button class="btn-enter" onclick="handleLogin()">
    <span id="btnText">¡Entrar a aprender! 🚀</span>
    <div class="spinner" id="spinner"></div>
  </button>
  <div class="maestro-link"><a href="maestro.html">🔐 Panel del Maestro</a></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const FB = { apiKey:"AIzaSyCdNyCxifi0-_SBSIQVlU1CV6UmWCbLsQk",authDomain:"midiendo-3ro.firebaseapp.com",projectId:"midiendo-3ro",storageBucket:"midiendo-3ro.firebasestorage.app",messagingSenderId:"64171435205",appId:"1:64171435205:web:812e5c845a0e63c4647cac" };
const db = getFirestore(initializeApp(FB));

// Stars
const starsEl=document.getElementById('stars');
for(let i=0;i<60;i++){const s=document.createElement('div');s.className='star';const sz=Math.random()*3+1;s.style.cssText=`width:${sz}px;height:${sz}px;left:${Math.random()*100}%;top:${Math.random()*100}%;animation-delay:${Math.random()*4}s;animation-duration:${2+Math.random()*3}s;`;starsEl.appendChild(s);}

let studentsCache=[];
async function loadStudents(){
  const sel=document.getElementById('studentSelect');
  try{
    const snap=await getDocs(collection(db,"students"));
    studentsCache=snap.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>a.name.localeCompare(b.name));
    sel.innerHTML='<option value="">— Escoge tu nombre —</option>';
    studentsCache.forEach(s=>{const o=document.createElement('option');o.value=s.id;o.textContent=s.name;sel.appendChild(o);});
    if(!studentsCache.length) sel.innerHTML='<option value="">No hay estudiantes todavía</option>';
  }catch{sel.innerHTML='<option value="">Error — recarga la página</option>';}
}
loadStudents();

window.handleLogin=function(){
  const id=document.getElementById('studentSelect').value;
  const code=document.getElementById('codeInput').value.trim();
  const err=document.getElementById('errorMsg');
  err.classList.remove('show');
  if(!id){showErr('⚠️ Escoge tu nombre primero.');return;}
  if(!code){showErr('⚠️ Escribe tu código secreto.');return;}
  document.getElementById('spinner').style.display='block';
  document.getElementById('btnText').style.display='none';
  setTimeout(()=>{
    const student=studentsCache.find(s=>s.id===id);
    if(!student||student.code!==code){
      document.getElementById('spinner').style.display='none';
      document.getElementById('btnText').style.display='block';
      showErr('⚠️ Código incorrecto. ¡Inténtalo de nuevo!');return;
    }
    sessionStorage.setItem('mnm_session',JSON.stringify({id:student.id,name:student.name}));
    window.location.href='app.html';
  },600);
};
function showErr(m){const e=document.getElementById('errorMsg');e.textContent=m;e.classList.add('show');}
document.getElementById('codeInput').addEventListener('keydown',e=>{if(e.key==='Enter')handleLogin();});
</script>
</body>
</html>
